<svg width="520" height="140" viewBox="0 0 520 140" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">TraderHub Logo</title>
  <desc id="desc">Professional cyan trading dashboard logo with market chart icon and TraderHub text.</desc>
  <defs>
    <linearGradient id="iconGrad" x1="20" y1="12" x2="132" y2="132" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="158" y1="36" x2="447" y2="103" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#CBD5E1"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="150" height="150" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#06B6D4" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <rect x="20" y="18" width="104" height="104" rx="24" fill="url(#iconGrad)"/>
    <rect x="34" y="32" width="76" height="76" rx="18" fill="#020617" fill-opacity="0.18"/>
    <path d="M48 82L62.5 67.5L75 78L94 54" stroke="#F8FAFC" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M49 96H96" stroke="#E0F2FE" stroke-width="6" stroke-linecap="round" opacity="0.95"/>
    <path d="M49 49H87" stroke="#E0F2FE" stroke-width="6" stroke-linecap="round" opacity="0.95"/>
    <circle cx="94" cy="54" r="5" fill="#F8FAFC"/>
  </g>

  <text x="154" y="76" fill="url(#textGrad)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="44" font-weight="800" letter-spacing="-1.5">
    Trader<tspan fill="#22D3EE">Hub</tspan>
  </text>
  <text x="157" y="103" fill="#94A3B8" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="16" font-weight="600" letter-spacing="2.8">
    MARKET INTELLIGENCE
  </text>
</svg>
